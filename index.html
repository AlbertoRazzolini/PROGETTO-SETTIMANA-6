<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atelier — Studio di architettura</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-md sticky-top" id="mainNavbar">
        <div class="container">
          <!-- Logo -->
          <a class="navbar-brand" href="#studio">
            <h1 class="atelier-logo mb-0">Atelier</h1>
          </a>

          <!-- Theme toggle (sempre visibile) + hamburger (solo mobile) -->
          <div class="d-flex align-items-center gap-2 order-md-last">
            <button
              class="btn btn-outline-light btn-sm"
              id="themeToggle"
              aria-label="Cambia tema"
            >
              <i class="bi bi-moon"></i>
            </button>
            <button
              class="navbar-toggler d-md-none"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#mainNav"
              aria-controls="mainNav"
              aria-expanded="false"
              aria-label="Apri menu"
            >
              <span class="navbar-toggler-icon"></span>
            </button>
          </div>

          <!-- Nav collassabile -->
          <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto align-items-md-center gap-md-1">
              <li class="nav-item">
                <a class="nav-link" href="#studio">Studio</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#servizi">Servizi</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#contatti">Contatti</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <section
      id="studio"
      class="hero d-flex align-items-center justify-content-center text-center"
    >
      <div class="container">
        <h2 class="hero__title">Architettura per spazi che parlano</h2>
        <p class="hero__subtitle">
          Progettiamo case, uffici e spazi commerciali con attenzione alla luce,
          ai materiali e al contesto.
        </p>
        <a href="#contatti" class="btn btn-light hero__cta"
          >Inizia un progetto</a
        >
      </div>
    </section>

    <section id="servizi">
      <!-- 3 card servizi affiancate da md in su -->
    </section>

    <section id="contatti">
      <!-- Form contatti Bootstrap, larghezza limitata e centrata -->
    </section>

    <footer>
      <!-- 3 colonne: Atelier+indirizzo / Link / Contatti. Copyright in fondo -->
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>
